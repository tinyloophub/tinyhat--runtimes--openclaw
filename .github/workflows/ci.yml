name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 is the interpreter the 208-test characterization net is
        # proven on. Two pre-existing tests
        # (RuntimeStateV1Tests.test_runtime_state_{skips_repeated_unchanged,
        # posts_changed}_*) mock time.time with a finite side_effect list
        # sized for py3.13, where logging stamps records via time.time_ns();
        # on <=3.12 logging consumes time.time() per record and the mock
        # exhausts (fails identically on unmodified main). Widen the matrix
        # to the Computer image's 3.10 once those tests are made
        # version-proof (tracked in the repo issues).
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Shell syntax
        run: bash -n bootstrap.sh dev/entrypoint.sh
      - name: Byte-compile
        run: python -m compileall -q supervisor.py tinyhat_cli
      - name: Characterization net (unmodified)
        run: python -m unittest tests.test_supervisor -v
      - name: CLI unit + proof-gate tests
        run: python -m unittest tests.test_tinyhat_cli tests.test_extraction_guards -v
