name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 = the Computer image's interpreter (Ubuntu 22.04);
        # 3.13 = the dev-machine interpreter the suite grew up on.
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Shell syntax
        run: bash -n bootstrap.sh dev/entrypoint.sh tiny_runtime/install.sh tiny_runtime/bake/assemble-bundle.sh tiny_runtime/bake/verify-bundle.sh tiny_runtime/dev/entrypoint.sh tiny_runtime/dev/fake-openclaw
      - name: Byte-compile
        run: python -m compileall -q supervisor.py tinyhat_cli tiny_runtime
      - name: Characterization net
        run: python -m unittest tests.test_supervisor -v
      - name: CLI unit + proof-gate tests
        run: python -m unittest tests.test_tinyhat_cli tests.test_extraction_guards -v
      - name: Command lock + spool + commands-ring tests
        run: python -m unittest tests.test_command_lock -v
      - name: Capability verification + unit-category allowlist
        run: python -m unittest tests.test_capability_check -v
      - name: tiny_runtime M1 substrate tests
        run: python -m unittest tests.test_tiny_runtime -v
